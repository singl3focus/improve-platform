# MVP local stack: frontend, backend (API + notification scheduler), postgres.
# Database state is preserved across restarts; migrations run automatically on startup.
# Usage: from repo root:
#   cp build/.env.example .env   # in repo root, then edit .env
#   docker compose -f build/docker-compose.yml up -d --build
# Backend health: GET http://localhost:8080/readyz

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-improve}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-improve}
      POSTGRES_DB: ${POSTGRES_DB:-improve}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-improve} -d ${POSTGRES_DB:-improve}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    image: migrate/migrate:v4.18.3
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "/usr/local/bin/migrate-and-ignore-no-change.sh"
    environment:
      MIGRATIONS_DATABASE_URL: postgres://${POSTGRES_USER:-improve}:${POSTGRES_PASSWORD:-improve}@postgres:5432/${POSTGRES_DB:-improve}?sslmode=disable
    volumes:
      - ../backend/migrations:/migrations:ro
      - ./migrate-and-ignore-no-change.sh:/usr/local/bin/migrate-and-ignore-no-change.sh:ro

  backend:
    build:
      context: ../backend
      dockerfile: ../build/backend.Dockerfile
    environment:
      APP_PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-improve}:${POSTGRES_PASSWORD:-improve}@postgres:5432/${POSTGRES_DB:-improve}?sslmode=disable
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-0}
      NOTIFY_HOUR: ${NOTIFY_HOUR:-9}
      NOTIFY_MINUTE: ${NOTIFY_MINUTE:-0}
      NOTIFY_TIMEZONE: ${NOTIFY_TIMEZONE:-UTC}
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ../frontend
      dockerfile: ../build/frontend.Dockerfile
    environment:
      BACKEND_API_URL: http://backend:8080
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres_data:
